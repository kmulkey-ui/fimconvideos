        dayCount++;
        var d = document.createElement('div');
        d.className = 'fc-day ' + (dayCount % 2 ? 'fc-day--green' : 'fc-day--blue');
        d.textContent = s.day;
        listEl.appendChild(d);
      }
      var speakerLine = (s.mod ? '<span class="fc-mod">'+s.mod+'</span>' + (s.speakers ? ' \u00B7 ' : '') : '') + (s.speakers||'');
      var card = document.createElement('div');
      card.className = 'fc-card';
      card.innerHTML =
        '<div class="fc-cardbody">' +
          '<div class="fc-meta">' +
          (s.time ? '<span class="fc-time">'+s.time+'</span>' : '') +
          '<span class="fc-badge">'+s.type+'</span></div>' +
          '<div class="fc-title">'+s.title+'</div>' +
          (speakerLine ? '<div class="fc-speakers">'+speakerLine+'</div>' : '') +
        '</div>' +
        '<button class="fc-watch" data-idx="'+i+'"><span class="fc-glow"></span><span class="fc-watch-label">'+playSvg+'Watch</span></button>';
      listEl.appendChild(card);
    });
    emptyEl.style.display = shown ? 'none' : 'block';
    countEl.textContent = filter ? (shown + ' of ' + sessions.length + ' sessions') : (sessions.length + ' recordings');
  }

  qEl.addEventListener('input', function(e){ render(e.target.value); });
  render("");

  // Indigo glow follows the cursor across the Watch buttons
  listEl.addEventListener('mousemove', function(e){
    var btn = e.target.closest('.fc-watch');
    if(!btn) return;
    var r = btn.getBoundingClientRect();
    btn.style.setProperty('--fc-gx', (e.clientX - r.left) + 'px');
    btn.style.setProperty('--fc-gy', (e.clientY - r.top) + 'px');
  });

  // ---- Lightbox video player ----
  var modal = document.getElementById('fc-modal');
  var player = document.getElementById('fc-player');
  var videoEl = document.getElementById('fc-video-el');
  var modalTitle = document.getElementById('fc-modal-title');

  function embedUrl(url){
    // Bunny Stream: use the embed URL as-is (owns its player: adaptive streaming, click-to-pause, no pop-out)
    if(url.indexOf('mediadelivery.net') > -1){
      return url + (url.indexOf('?') > -1 ? '&' : '?') + 'autoplay=true&preload=true&responsive=true';
    }
    // Google Drive: turn any share link into an embeddable /preview URL
    if(url.indexOf('drive.google.com') > -1){
      var g = url.match(/\/d\/([\w-]+)/) || url.match(/[?&]id=([\w-]+)/);
      if(g) return 'https://drive.google.com/file/d/' + g[1] + '/preview';
    }
    // Vimeo (default)
    var m = url.match(/video\/(\d+)/);
    var id = m ? m[1] : "";
    return 'https://player.vimeo.com/video/' + id + '?autoplay=1&title=0&byline=0&portrait=0';
  }
  function openModal(s){
    modalTitle.textContent = s.title;
    var isFile = /\.(mp4|webm|ogv|ogg|mov|m4v)(\?|#|$)/i.test(s.url);
    modal.classList.toggle('fc-drive', !isFile && s.url.indexOf('drive.google.com') > -1);
    if(isFile){
      // Direct video file: use the HTML5 <video> player
      player.style.display = 'none';
      player.src = '';
      videoEl.style.display = 'block';
      videoEl.src = s.url;
      videoEl.play().catch(function(){});
    } else {
      // Vimeo / Google Drive: use the iframe embed
      videoEl.pause();
      videoEl.removeAttribute('src');
      videoEl.load();
      videoEl.style.display = 'none';
      player.style.display = '';
      player.src = embedUrl(s.url);
    }
    modal.classList.add('fc-open');
    modal.setAttribute('aria-hidden','false');
    document.body.style.overflow = 'hidden';
  }
  function closeModal(){
    modal.classList.remove('fc-open');
    modal.setAttribute('aria-hidden','true');
    player.src = '';
    videoEl.pause();
    videoEl.removeAttribute('src');
    videoEl.load();
    document.body.style.overflow = '';
  }

  listEl.addEventListener('click', function(e){
    var btn = e.target.closest('.fc-watch');
    if(!btn) return;
    openModal(sessions[+btn.getAttribute('data-idx')]);
  });
  document.getElementById('fc-modal-close').addEventListener('click', closeModal);
  modal.querySelector('.fc-modal-backdrop').addEventListener('click', closeModal);
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && modal.classList.contains('fc-open')) closeModal();
  });
})();
</script>
